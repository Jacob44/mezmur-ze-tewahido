<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>መዝሙር ዘተዋህዶ — Mezmur Ze Tewahido</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;500;700&family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#2a1410; --bg2:#3a1d16; --paper:#FBF3DD; --ink:#2c2417;
  --gold:#C49A2E; --gold-2:#E4C36B; --blue:#13345F; --red:#9A1B1B; --muted:#8A7A55;
  --card:#fffdf6; --border:#e6d9b6;
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Noto Serif",Georgia,serif;color:var(--ink);background:var(--paper);}
a{color:inherit;text-decoration:none;}

/* ---------- HERO ---------- */
.hero{position:relative;overflow:hidden;color:#f7eccd;text-align:center;
  background-color:#160a07;
  background-image:linear-gradient(180deg,rgba(16,7,4,.62),rgba(16,7,4,.50) 42%,rgba(16,7,4,.86)),url("hero.webp");
  background-size:cover;background-position:center 32%;background-repeat:no-repeat;
  padding:66px 20px 54px;border-bottom:3px solid var(--gold);}
.hero::before,.hero::after{content:"✝";position:absolute;color:rgba(247,236,205,.07);font-size:210px;line-height:1;}
.hero::before{left:-30px;top:-40px;}
.hero::after{right:-30px;bottom:-90px;}
.hero .cross{font-size:40px;color:var(--gold-2);margin-bottom:6px;}
.hero h1{margin:0;font-family:"Noto Sans Ethiopic",serif;font-weight:700;font-size:46px;letter-spacing:.5px;
  color:#fbf3dd;text-shadow:0 2px 10px rgba(0,0,0,.4);}
.hero .latin{margin:4px 0 2px;font-size:17px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-2);}
.hero .tag{margin:8px auto 22px;max-width:560px;color:#e9dcc0;font-style:italic;opacity:.9;}
.search{max-width:560px;margin:0 auto;position:relative;}
.search input{width:100%;font-family:inherit;font-size:17px;padding:14px 18px 14px 46px;border-radius:30px;border:1px solid var(--gold);
  background:rgba(255,253,246,.97);color:var(--ink);box-shadow:0 8px 24px rgba(0,0,0,.25);}
.search input:focus{outline:none;border-color:var(--gold-2);box-shadow:0 8px 30px rgba(0,0,0,.35);}
.search .mag{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;}
.stat{margin-top:14px;font-size:13px;color:var(--gold-2);letter-spacing:1px;}

/* ---------- CHIPS ---------- */
.wrap{max-width:1080px;margin:0 auto;padding:0 18px;}
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:22px 0 6px;}
.chip{font-family:inherit;font-size:14px;padding:7px 16px;border-radius:20px;border:1px solid var(--border);
  background:#fff;color:var(--ink);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--gold);}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.chip .am{font-family:"Noto Sans Ethiopic",serif;}

/* ---------- GRID ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px;margin:22px 0 50px;}
.card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 18px 16px;
  cursor:pointer;overflow:hidden;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 8px rgba(60,45,10,.06);}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(60,45,10,.16);}
.card .bar{position:absolute;left:0;top:0;width:100%;height:5px;background:linear-gradient(90deg,var(--gold),var(--gold-2));}
.card .wm{position:absolute;right:-8px;bottom:-18px;font-size:84px;color:rgba(196,154,46,.08);}
.card .ttl{font-family:"Noto Sans Ethiopic",serif;font-weight:700;font-size:21px;color:var(--blue);line-height:1.35;margin:6px 0 2px;}
.card .lat{font-size:13px;color:var(--muted);font-style:italic;min-height:16px;}
.card .meta{margin-top:12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);}
.card .pill{background:#f3ead0;color:#7a6a45;border-radius:10px;padding:2px 9px;}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);font-style:italic;padding:40px;}

/* ---------- SONG VIEW ---------- */
.song-wrap{max-width:820px;margin:0 auto;padding:22px 18px 60px;}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:15px;margin-bottom:14px;}
.back:hover{color:var(--gold);}
.song-head{text-align:center;border-bottom:2px solid var(--gold);padding-bottom:14px;margin-bottom:6px;}
.song-head .cross{color:var(--gold);font-size:26px;}
.song-head h2{font-family:"Noto Sans Ethiopic",serif;margin:4px 0 2px;font-size:34px;color:var(--blue);}
.song-head .sub{color:var(--muted);font-style:italic;}
.toolbar{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin:16px 0 20px;}
.toolbar select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;}
.btn{font-family:inherit;font-size:14px;padding:9px 16px;border:none;border-radius:8px;cursor:pointer;background:var(--gold);color:#3a2c05;}
.btn:hover{background:#b1881f;}
.toggle{display:inline-flex;align-items:center;gap:7px;font-size:14px;cursor:pointer;}
.lyrics{border-radius:14px;padding:30px 30px;border:1px solid var(--border);}
.verse{margin-bottom:18px;}
.verse+.verse{border-top:1px solid rgba(0,0,0,.07);padding-top:14px;}
.la{font-family:"Noto Sans Ethiopic",serif;font-weight:700;font-size:23px;line-height:1.5;}
.ll{font-weight:600;font-size:17px;line-height:1.3;margin-bottom:7px;}
.src{margin-top:18px;font-size:12px;color:var(--muted);text-align:center;}

footer{position:relative;color:#efe2c6;text-align:center;padding:30px 22px;font-size:13px;background-color:#160a07;background-image:linear-gradient(rgba(16,7,4,.82),rgba(16,7,4,.9)),url("hero.webp");background-size:cover;background-position:center 62%;}
footer .gold{color:var(--gold-2);}
.browse-wrap{text-align:center;}
.browse{display:inline-flex;gap:4px;background:#f3ead0;border:1px solid var(--border);border-radius:22px;padding:3px;margin:20px 0 2px;}
.browse button{font-family:inherit;font-size:13px;padding:6px 16px;border:none;border-radius:18px;background:transparent;color:#6b5c38;cursor:pointer;}
.browse button.active{background:var(--blue);color:#fff;}
@media(max-width:560px){ .hero h1{font-size:34px;} .grid{grid-template-columns:1fr 1fr;gap:12px;} .card .ttl{font-size:18px;} }
</style>
</head>
<body>
<div id="app"></div>
<script src="core.js"></script>
<script src="songs.js"></script>
<script>
const C = window.MezmurCore;
const SONGS = (window.SONGS||[]).map((s,i)=>{
  s.id = s.id || ('song-'+i);
  if(!s.title) s.title={am:'',latin:''};
  if(!s.title.latin) s.title.latin = C.transliterateText(s.title.am||'');
  s._verses = C.buildVersesFromText(s.lyrics);
  return s;
});

const CATS = [
  {key:'all',    am:'ሁሉም',  en:'All'},
  {key:'marian', am:'ማርያም', en:'Marian',     kw:['ማርያም','እመቤት','ድንግል','እናት','ኪዳነ','አይናችን ነሽ','ለማርያም']},
  {key:'feast',  am:'በዓላት', en:'Feasts',     kw:['ተነሥቷል','ትንሳኤ','ሆሳዕና','ፍስሀ','ልደት','ጌታዬ ሆነ','ዕርገት','ዐረገ']},
  {key:'trinity',am:'ስላሴ',  en:'Trinity',    kw:['ስላሴ']},
  {key:'saints', am:'ቅዱሳን', en:'Saints',     kw:['ጴጥሮስ','ጳውሎስ','ዮሐንስ','ያሬድ','ገብርኤል','ሚካኤል','ዶኪማስ','መልአከ','እስራኤል']},
  {key:'praise', am:'ምስጋና', en:'Praise',     kw:['ስብሐት','ምስጋና','ተመስገን','ደስ ይበለን','አመስግኑ','አዳነኝ','ቸርነት']},
  {key:'general',am:'ሌሎች',  en:'Other'}
];
function catsOf(s){
  const hay=(s.title.am||'')+' '+(s.lyrics||'').slice(0,160);
  const out=[];
  CATS.forEach(c=>{ if(c.kw && c.kw.some(k=>hay.includes(k))) out.push(c.key); });
  return out.length?out:['general'];
}
SONGS.forEach(s=>s._cats=catsOf(s));
const COLLECTIONS = Array.from(new Set(SONGS.map(s=>(s.album&&s.album.latin)||'').filter(Boolean)));

let state={cat:'all',coll:'all',browse:'theme',q:''};
try{ const t=localStorage.getItem('mezmurTheme'); }catch(e){}

function esc(t){return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function filtered(){
  const q=state.q.trim().toLowerCase();
  return SONGS.filter(s=>{
    if(state.browse==='theme' && state.cat!=='all' && !s._cats.includes(state.cat)) return false;
    if(state.browse==='coll' && state.coll!=='all' && (((s.album&&s.album.latin)||'')!==state.coll)) return false;
    if(!q) return true;
    return ((s.title.am||'')+' '+(s.title.latin||'')+' '+C.transliterateText(s.title.am||'')).toLowerCase().includes(q);
  });
}

function homeView(){
  const list=filtered();
  const chips=(state.browse==='coll'
    ? [{k:'all',l:'ሁሉም · All'}].concat(COLLECTIONS.map(c=>({k:c,l:c}))).map(c=>`<button class="chip ${state.coll===c.k?'active':''}" data-coll="${esc(c.k)}">${esc(c.l)}</button>`)
    : CATS.map(c=>`<button class="chip ${state.cat===c.key?'active':''}" data-cat="${c.key}"><span class="am">${c.am}</span> · ${c.en}</button>`)
  ).join('');
  const browseToggle=`<div class="browse-wrap"><div class="browse"><button class="${state.browse==='theme'?'active':''}" data-browse="theme">በጭብጥ · Theme</button><button class="${state.browse==='coll'?'active':''}" data-browse="coll">በስብስብ · Collection</button></div></div>`;
  const cards=list.map(s=>{
    const v=s._verses.length;
    const album=(s.album&&(s.album.latin||s.album.am))||'';
    return `<div class="card" data-id="${s.id}">
      <div class="bar"></div><div class="wm">✝</div>
      <div class="ttl">${esc(s.title.am||s.title.latin)}</div>
      <div class="lat">${esc(s.title.latin)}</div>
      <div class="meta"><span class="pill">${esc(album)}</span><span>${v} verses</span></div>
    </div>`;
  }).join('') || `<div class="empty">ምንም መዝሙር አልተገኘም — No matches.</div>`;

  return `
  <div class="hero">
    <div class="cross">✝</div>
    <h1>መዝሙር ዘተዋህዶ</h1>
    <div class="latin">Mezmur Ze Tewahido</div>
    <div class="tag">የኦርቶዶክስ ተዋህዶ መዝሙራት — ግጥም፣ ፊደል-መለወጥ፣ እና ለስክሪን ዝግጁ ስላይዶች</div>
    <div class="search"><span class="mag">⌕</span><input id="q" type="search" placeholder="መዝሙር ይፈልጉ —  search in Amharic or Latin…" value="${esc(state.q)}"></div>
    <div class="stat">${SONGS.length} መዝሙራት · ${SONGS.length} mezmurs</div>
  </div>
  <div class="wrap">
    ${browseToggle}
    <div class="chips">${chips}</div>
    <div class="grid">${cards}</div>
  </div>
  <footer>✝ &nbsp; <span class="gold">መዝሙር ዘተዋህዶ</span> &nbsp;·&nbsp; Orthodox Tewahedo mezmur — lyrics, transliteration &amp; slides</footer>`;
}

function songView(id){
  const s=SONGS.find(x=>x.id===id);
  if(!s) return homeView();
  const T=C.THEMES[themeVal()]||C.THEMES[C.DEFAULT_THEME];
  const album=(s.album&&(s.album.am||s.album.latin))||'';
  let body='';
  s._verses.forEach(v=>{
    body+='<div class="verse">';
    v.forEach(it=>{
      if(it.amharic){ body+=`<div class="la" style="color:#${T.amh}">${esc(it.amharic)}</div>`;
        body+=`<div class="ll lat-line" style="color:#${T.lat}">${esc(it.latin)}</div>`; }
      else body+=`<div class="ll lat-line" style="color:#${T.lat}">${esc(it.latin)}</div>`;
    });
    body+='</div>';
  });
  const themeOpts=Object.keys(C.THEMES).map(k=>`<option ${k===themeVal()?'selected':''}>${k}</option>`).join('');
  return `
  <div class="song-wrap">
    <a class="back" href="#/">← ወደ ቤተ-መዝሙር · Library</a>
    <div class="song-head"><div class="cross">✝</div>
      <h2>${esc(s.title.am||s.title.latin)}</h2>
      <div class="sub">${esc(s.title.latin)}${album?' · '+esc(album):''}</div>
    </div>
    <div class="toolbar">
      <label class="toggle"><input type="checkbox" id="latToggle" checked> ፊደል-መለወጥ · transliteration</label>
      <select id="themeSel">${themeOpts}</select>
      <button class="btn" id="dlPdf">PDF</button>
      <button class="btn" id="dlPpt">PPT</button>
    </div>
    <div class="lyrics" style="background:#${T.bg};border-color:#${T.accent}55">${body}</div>
    ${s.source&&s.source.from?`<div class="src">ምንጭ · Source: ${esc(s.source.from)}</div>`:''}
  </div>`;
}

function themeVal(){
  try{ const t=localStorage.getItem('mezmurTheme'); if(t&&C.THEMES[t]) return t; }catch(e){}
  return C.DEFAULT_THEME;
}

function render(){
  const m=location.hash.match(/^#\/song\/(.+)$/);
  const app=document.getElementById('app');
  app.innerHTML = m ? songView(decodeURIComponent(m[1])) : homeView();
  if(m){
    const s=SONGS.find(x=>x.id===decodeURIComponent(m[1]));
    const tog=document.getElementById('latToggle');
    tog.addEventListener('change',e=>{ document.querySelectorAll('.lat-line').forEach(el=>el.style.display=e.target.checked?'':'none'); });
    const sel=document.getElementById('themeSel');
    sel.addEventListener('change',()=>{ try{localStorage.setItem('mezmurTheme',sel.value);}catch(e){} render(); });
    document.getElementById('dlPdf').addEventListener('click',()=>C.exportSongPDF(s,sel.value));
    document.getElementById('dlPpt').addEventListener('click',()=>C.exportSongPPT(s,sel.value));
  } else {
    const q=document.getElementById('q');
    q.addEventListener('input',e=>{ state.q=e.target.value; const g=document.querySelector('.grid'); if(g) g.innerHTML=gridHtml(); bindCards(); });
    document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{ if(ch.dataset.cat!==undefined)state.cat=ch.dataset.cat; if(ch.dataset.coll!==undefined)state.coll=ch.dataset.coll; render(); }));
    document.querySelectorAll('.browse button').forEach(b=>b.addEventListener('click',()=>{ state.browse=b.dataset.browse; render(); }));
    bindCards();
  }
}
function gridHtml(){
  const list=filtered();
  return list.map(s=>{
    const v=s._verses.length; const album=(s.album&&(s.album.latin||s.album.am))||'';
    return `<div class="card" data-id="${s.id}"><div class="bar"></div><div class="wm">✝</div>
      <div class="ttl">${esc(s.title.am||s.title.latin)}</div><div class="lat">${esc(s.title.latin)}</div>
      <div class="meta"><span class="pill">${esc(album)}</span><span>${v} verses</span></div></div>`;
  }).join('') || `<div class="empty">ምንም መዝሙር አልተገኘም — No matches.</div>`;
}
function bindCards(){ document.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>{ location.hash='#/song/'+encodeURIComponent(c.dataset.id); })); }

window.addEventListener('hashchange',render);
render();
</script>
</body>
</html>
